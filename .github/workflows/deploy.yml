name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.SERVER_HOST }} "
            cd ~/vidcraft &&
            git remote set-url origin https://${{ secrets.GIT_TOKEN }}@github.com/1fHu/aigc-shop-reel.git &&
            git pull origin master &&
            sudo docker compose -f docker/docker-compose.prod.yml up -d --build
          "
