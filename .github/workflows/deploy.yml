name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@${{ secrets.SERVER_HOST }} "
            cd ~/vidcraft &&
            git remote set-url origin https://${{ secrets.GIT_TOKEN }}@github.com/1fHu/aigc-shop-reel.git &&
            git pull origin master &&
            sudo docker compose -f docker/docker-compose.prod.yml up -d --build
          "
